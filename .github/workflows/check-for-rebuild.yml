name: Check for rebuild

on:
  workflow_call:
    inputs:
      version:
        description: 'A php version that should be using to build the image'
        required: true
        type: string
      is-latest:
        description: 'Whether this is the latest PHP version'
        required: false
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if update on base image is available
        id: check
        uses: lucacome/docker-image-update-checker@v3
        with:
          base-image: php:${{ inputs.version }}-fpm-alpine
          image: ghcr.io/${{ github.repository_owner }}/php-fpm-prod:${{ inputs.version }}

  build:
    name: Production Build and Push
    if: needs.check.outputs.needs-updating == 'true'
    needs: check
    uses: ./.github/workflows/production-build-and-push.yml
    with:
      version: ${{ inputs.version }}
      is-latest: ${{ inputs.is-latest }}
